unbind C-b
set -g prefix C-a
bind a send-prefix

bind r source-file ~/.tmux.conf

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Prevent wrapping
bind h if-shell -F -t = "#{pane_at_left}" "" "select-pane -L"
bind j if-shell -F -t = "#{pane_at_bottom}" "" "select-pane -D"
bind k if-shell -F -t = "#{pane_at_top}" "" "select-pane -U"
bind l if-shell -F -t = "#{pane_at_right}" "" "select-pane -R"

bind C-a last-window

bind C-c new-window
bind C-n next-window
bind C-p previous-window

bind C-t run-shell -b '$HOME/dots/config/tmux/pane-tabs add "#{pane_id}"'
bind -r N run-shell -b '$HOME/dots/config/tmux/pane-tabs next "#{pane_id}"'
bind -r P run-shell -b '$HOME/dots/config/tmux/pane-tabs previous "#{pane_id}"'
bind x run-shell -b '$HOME/dots/config/tmux/pane-tabs kill "#{pane_id}"'

bind ( run-shell -b '$HOME/dots/config/tmux/session previous'
bind ) run-shell -b '$HOME/dots/config/tmux/session next'
bind s display-popup -w 80% -E '$HOME/dots/config/tmux/session pick'

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r H resize-pane -L 1
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 1

# Copy last command output to tmux clipboard
bind-key -r o copy-mode \;\
  send-keys -X start-of-line \;\
  send-keys -X search-backward "❯" \;\
  send-keys -X next-word \;\
  send-keys -X begin-selection \;\
  send-keys -X search-forward "❯" \;\
  send-keys -X cursor-up \;\
  send-keys -X cursor-up \;\
  send-keys -X cursor-up \;\
  send-keys -X end-of-line \;\
  send-keys -X copy-selection-and-cancel

set -g default-terminal "tmux-256color"

set -g escape-time 10
set -g allow-passthrough on
set -g history-limit 50000
set -g remain-on-exit on
set -g remain-on-exit-format ''
set -s focus-events on
set -g mouse on
set-hook -g pane-died 'run-shell -b "$HOME/dots/config/tmux/pane-tabs died \"#{hook_pane}\""'
run-shell -b '$HOME/dots/config/tmux/pane-tabs cleanup'

# Set C-i for distinct Tab/C-i behavior (F13 sequence)
bind-key -T root C-i send-keys "\e[1;2P"

set -as set-clipboard on
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

bg='#24283b'
fg='#6d6594'
active='#bb9af7'
set -g status-style fg=$fg,bg=$bg
set -g message-style fg=$bg,bg=$active
set -g status-left ''
set -g status-right "#{?@pane_tabs_group, 󰓪 #[fg=$active]#{@pane_tabs_status}#[default],} 󰌢 #[fg=$active]#H#[default]  #[fg=$active]#S#[default] "
set -g window-status-format " #{?window_zoomed_flag,,} #W "
set -g window-status-current-format "#[fg=$bg,bg=$active] #{?window_zoomed_flag,,} #W "
set -g pane-border-style fg=$fg
set -g pane-active-border-style fg=$active
